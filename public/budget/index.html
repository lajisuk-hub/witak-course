<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>어린이집 예산서 연습 게임 🎯</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Gaegu:wght@400;700&family=Jua&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-icon">🎯</span>
          <div>
            <h1>예산서 연습 게임</h1>
            <p class="subtitle">어린이집 세입·세출 예산서 함께 만들기</p>
          </div>
        </div>
        <div class="progress-wrap">
          <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
          <span class="progress-text" id="progressText">1 / 17</span>
        </div>
      </div>
    </header>

    <main class="main" id="main"></main>

    <nav class="nav-bottom">
      <button class="btn btn-ghost" id="btnPrev">← 이전</button>
      <button class="btn btn-primary" id="btnNext">다음 →</button>
    </nav>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="app.js"></script>

  <!-- 신규위탁 과정 앱과 이어 주는 다리 (원본에는 없던 것) -->
  <script>
    // app.js 의 state·calc 는 최상위 const 라 window 속성이 아니다.
    // 같은 전역 렉시컬 환경을 쓰는 이 스크립트에서는 그대로 읽을 수 있다.
    window.__witakBudget = function () {
      return { state: state, calc: calc, CONSTANTS: CONSTANTS };
    };
    // 마지막 단계에 왔는지 알려 준다
    window.__witakStep = function () {
      return { now: state.currentStep, total: state.totalSteps };
    };
  </script>
</body>
</html>
